# ============================================================================
# 인제스션 매핑 (SSOT) — maxdl / FU-4 (자동 생성: introspection 기반)
# 규칙: PK 존재 AND 시간(커서)컬럼 존재 → merge / 그 외 → replica
# 컬럼 상세 전체는 config/source-schema.json 참조. 재생성: 동일 introspection.
# 적재모드→Airbyte sync: merge=Incremental|Append+Dedup(cursor+PK),
#   replica=Full Refresh|Overwrite. CDC 미사용(컬럼 커서).
# ============================================================================
modes:
  merge:   { syncMode: incremental,  destinationSyncMode: append_dedup, requires: [cursorField, primaryKey] }
  replica: { syncMode: full_refresh, destinationSyncMode: overwrite,    requires: [] }
  append:  { syncMode: incremental,  destinationSyncMode: append,       requires: [cursorField] }

destination:
  connector: destination-s3-data-lake
  catalog: { type: POLARIS, server_uri: "http://polaris.maxdl-catalog.svc.cluster.local:8181/api/catalog", warehouse: bronze }
  s3: { endpoint: "http://host.k3d.internal:8333", region: kr-dw-pt-001, pathStyleAccess: true, bucket: maxdl-warehouse, secret: seaweedfs-s3 }

