# ============================================================================
# 인제스션 매핑 (SSOT) — maxdl / FU-4 (introspection 기반, nullable 반영)
# 규칙: merge = PK 존재 AND temporal 커서가 NOT NULL / 그 외 = replica
#  (Airbyte Postgres 소스는 nullable 커서를 incremental 에서 거부 → 전체 실패)
# 컬럼 상세: config/source-schema.json. merge=Incremental|Append+Dedup,
# replica=Full Refresh|Overwrite. CDC 미사용(컬럼 커서).
# ----------------------------------------------------------------------------
# [주의] sources.<>.replicationMethod 필드는 현재 어느 스크립트에서도
#   읽지 않는다(airbyte-apply 가 커넥터별 Standard 를 하드코딩, dbt-gen
#   미참조). 값을 'standard' 외로 바꿔도 동작 무변경 — 이 필드만으로
#   CDC 가 켜지지 않는다. CDC 전환은 src_config()/소스 설정 변경이
#   필요한 별도 트랙(계획서 핵심설계 §2, FU-4). 표기는 SSOT 의도 기록용.
# ============================================================================
modes:
  merge:   { syncMode: incremental,  destinationSyncMode: append_dedup, requires: [cursorField, primaryKey] }
  replica: { syncMode: full_refresh, destinationSyncMode: overwrite,    requires: [] }
  append:  { syncMode: incremental,  destinationSyncMode: append,       requires: [cursorField] }

destination:
  connector: destination-s3-data-lake
  catalog: { type: POLARIS, server_uri: "http://polaris.maxdl-catalog.svc.cluster.local:8181/api/catalog", warehouse: bronze }
  # [SSOT] endpoint/region/bucket 의 단일출처는 secrets.env → seaweedfs-s3
  # 시크릿. airbyte-apply 는 그 시크릿에서 읽음(아래 값은 비권위·정보용
  # 참고치). 개발=내부 Docker, 운영=폐쇄망 외부 S3 전환은 secrets.env 만 교체.
  s3: { endpoint: "(SSOT: secrets.env S3_ENDPOINT)", region: "(SSOT: S3_REGION)", pathStyleAccess: true, bucket: "(SSOT: S3_WAREHOUSE_BUCKET)", secret: seaweedfs-s3 }

