# =============================================================================
# OpenMetadata Helm values — maxdl (차트 1.12.8)
# - 메타데이터/거버넌스/리니지. 의존성: openmetadata-dependencies(MySQL+
#   OpenSearch+Airflow) 는 별도 릴리스 `openmetadata-deps` 로 기배포.
# - db host(mysql)/search host(opensearch) 는 차트 기본값과 일치.
# - Airflow apiEndpoint 만 릴리스명 보정(deps 릴리스=openmetadata-deps).
# - 외부 노출은 별도 NodePort Service(30085)로 처리(차트 service 에 nodePort
#   필드 부재) — deploy/k8s/openmetadata/nodeport-svc.yaml.
# =============================================================================
openmetadata:
  config:
    pipelineServiceClientConfig:
      airflow:
        # deps 릴리스명이 openmetadata-deps 이므로 api-server 서비스명 보정
        apiEndpoint: http://openmetadata-deps-api-server:8080

# 단일 노드 리소스 절제
resources:
  requests: { cpu: "300m", memory: "1Gi" }
  limits: { memory: "3Gi" }
