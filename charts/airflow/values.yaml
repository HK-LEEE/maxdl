# =============================================================================
# Apache Airflow Helm values — maxdl (차트 1.21.0 / app 3.2.0)
# - 오케스트레이션: Airbyte 동기화 → dbt(Cosmos) → DQ (계획서 §6).
# - executor=KubernetesExecutor(스파이키 ELT 에 적합, 유휴 워커 없음).
# - 단일 노드 개발: 번들 postgresql 사용, redis 불필요(K8s executor).
# - DAG 전달: 우선 PVC(persistence). Cosmos/dbt 동봉 커스텀 이미지는 후속
#   (레지스트리 결정 필요) — 본 단계는 플랫폼 가동 + DAG IaC 작성까지.
# - 외부 노출: api-server NodePort 30082(정책: 30000번대).
# =============================================================================
executor: "KubernetesExecutor"

# 예제 DAG 비활성(차트 기본 False 이나 명시)
config:
  core:
    load_examples: 'False'

# 웹/메타 보안키(개발 고정 — 운영 시 시크릿 분리)
webserverSecretKey: "maxdl-airflow-dev-secret-key"

# 번들 메타DB 사용, redis 불필요
postgresql:
  enabled: true
redis:
  enabled: false

# DAG 영속 볼륨(초기: 빈 PVC. git-sync/커스텀이미지는 후속 wiring)
dags:
  persistence:
    enabled: true
    size: 1Gi
  gitSync:
    enabled: false

# API 서버(Airflow 3) 외부 노출 + 리소스 절제
apiServer:
  resources:
    requests: { cpu: "150m", memory: "512Mi" }
  service:
    type: NodePort
    ports:
      - name: api-server
        port: 8080
        nodePort: 30082

# 단일 노드 리소스 절제
scheduler:
  resources:
    requests: { cpu: "150m", memory: "512Mi" }
workers:
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
