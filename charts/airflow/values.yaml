# =============================================================================
# Apache Airflow Helm values — maxdl (차트 1.21.0 / app 3.2.0)
# - 오케스트레이션: Airbyte 동기화 → dbt(Cosmos) → DQ (계획서 §6).
# - executor=KubernetesExecutor(스파이키 ELT 에 적합, 유휴 워커 없음).
# - 단일 노드 개발: 번들 postgresql 사용, redis 불필요(K8s executor).
# - DAG 전달: 우선 PVC(persistence). Cosmos/dbt 동봉 커스텀 이미지는 후속
#   (레지스트리 결정 필요) — 본 단계는 플랫폼 가동 + DAG IaC 작성까지.
# - 외부 노출: api-server NodePort 30082(정책: 30000번대).
# =============================================================================
executor: "KubernetesExecutor"

# FU-3: Cosmos+dbt-trino+providers-airbyte+dbt프로젝트+DAG 동봉 커스텀 이미지
# (k3d image import 로 노드에 적재 → pullPolicy Never)
images:
  airflow:
    repository: maxdl/airflow
    tag: fu3
    pullPolicy: Never

# Trino/Airbyte 접속 env (전 Airflow 컴포넌트·태스크 pod 공통)
env:
  - name: TRINO_HOST
    value: "trino.maxdl-query.svc.cluster.local"
  - name: TRINO_PORT
    value: "8080"
  - name: TRINO_USER
    value: "dbt"
  - name: AIRBYTE_API
    value: "http://airbyte-airbyte-server-svc.maxdl-ingest:8001"
  # 동시성 상한(단일노드 Trino 과부하/OOM 방지) + DAG당 동시 run 1개
  # (env 가 cfg 보다 우선·KE pod 전파 확실. config.core.* 는 차트서 미적용됨)
  - name: AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG
    value: "4"
  - name: AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG
    value: "1"
  - name: AIRFLOW__CORE__PARALLELISM
    value: "8"
# Airbyte API 자격: 차트 env 스키마는 valueFrom 미허용 → extraEnvFrom(secretRef)
# 사용. scheduled ingest run 의 airbyte_sync 성공으로 KE pod 전파 입증됨.
extraEnvFrom: |
  - secretRef:
      name: airbyte-api

# 동시성 상한(단일노드 Trino 과부하/OOM 방지) + DAG당 동시 run 1개
# (max_active_runs_per_dag=1 → unpause 자동 scheduled run 과 manual 트리거가
#  동시 실행되어 같은 Airbyte 커넥션에 충돌하던 문제도 구조적으로 차단)
config:
  core:
    load_examples: 'False'

# 웹/메타 보안키: values 평문 금지(FU-5). SealedSecret 참조.
# (airflow-webserver-secret 의 key 'webserver-secret-key')
webserverSecretKeySecretName: airflow-webserver-secret

# 번들 메타DB 사용, redis 불필요
postgresql:
  enabled: true
redis:
  enabled: false

# DAG 은 커스텀 이미지에 동봉(/opt/airflow/dags) → persistence/git-sync 불필요
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

# API 서버(Airflow 3) 외부 노출 + 리소스 절제
apiServer:
  resources:
    requests: { cpu: "150m", memory: "512Mi" }
  service:
    type: NodePort
    ports:
      - name: api-server
        port: 8080
        nodePort: 30082

# 단일 노드 리소스 절제
scheduler:
  resources:
    requests: { cpu: "150m", memory: "512Mi" }
workers:
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
