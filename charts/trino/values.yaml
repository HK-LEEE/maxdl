image:
  tag: "481"

# =============================================================================
# Trino Helm values — maxdl (차트 1.42.2 / app 480, 버전 정책: 안정 최신 핀)
# - Iceberg REST → Polaris(maxdl-catalog), native S3 → 공유 SeaweedFS.
# - 레이어별 Polaris 카탈로그(bronze/silver/gold) → Trino 카탈로그 3개 매핑.
# - SeaweedFS 는 STS/vended 미지원 → vended-credentials-enabled=false +
#   정적 S3 키(seaweedfs-s3 시크릿) + path-style(계획서 §리스크 1·2).
# - 비밀값은 env(secretKeyRef) 주입, 카탈로그 파일은 ${ENV:...} 참조.
# =============================================================================

# 단일 노드 개발: 코디네이터1 + 워커1, 리소스 절제
# server.config.authenticationType = FU-9 1단계(코드-only, 컷오버 활성)
server:
  workers: 1
  config:
    authenticationType: "password"

coordinator:
  resources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits:   { memory: "4Gi" }
  # FU-9/4단계: 그룹 provider(file). ConfigMap 키 '/' 불가 → 평탄.
  # 코드-only(컷오버 활성). groups.txt = 거버넌스 운영 편집 표면.
  additionalConfigFiles:
    group-provider.properties: |-
      group-provider.name=file
      file.group-file=/etc/trino/groups.txt
    groups.txt: |-
      analysts:admin
worker:
  resources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits:   { memory: "6Gi" }

# 외부 노출: NodePort 30080 (정책: 30000번대)
service:
  type: NodePort
  port: 8080
  nodePort: 30080

# 비밀값 주입(모든 pod 공통): Polaris OAuth2 / SeaweedFS S3 정적 키
env:
  - name: POLARIS_CREDENTIAL          # "root:<secret>" (스파이크) — polaris-oauth
    valueFrom: { secretKeyRef: { name: polaris-oauth, key: credential } }
  - name: S3_ACCESS_KEY
    valueFrom: { secretKeyRef: { name: seaweedfs-s3, key: accessKey } }
  - name: S3_SECRET_KEY
    valueFrom: { secretKeyRef: { name: seaweedfs-s3, key: secretKey } }

# =============================================================================
# 인증 (1단계: 코드화만 — 라이브 미적용. 컷오버는 Superset 임퍼소네이션과
#  동시에. 지금 켜면 자격 없는 Superset/dbt 즉시 차단됨 — 의도된 보류).
# - **파일 기반 PASSWORD 인증** (SSO/JWT 미사용 — 단순화 결정). 사람·기계
#   (svc-dbt) 모두 password-file 의 유저. 유저단위·컬럼마스킹·중앙정책은
#   Ranger 가 "인증된 Trino 유저명" 기준으로 그대로 가능(인증방식 무관).
# - 사내망이라 allow-insecure-over-http=true (정식 TLS 는 FU-7 보류 그대로).
# - password db(htpasswd 포맷 Secret 'trino-password-db')는 컷오버 시
#   secrets.env(SVC_DBT_PASSWORD 등 유저별)로 생성(다음 dbt-path 단계 배선).
# - 트레이드오프: 유저 추가/삭제 수동(중앙 디렉토리/SSO 없음) — 소수 유저 수용.
#   (server.config.authenticationType 는 상단 server 블록에 통합)
# =============================================================================
auth:
  # 컷오버 시 생성되는 htpasswd 포맷 Secret(svc-dbt + 사람 유저) 참조
  passwordAuthSecret: "trino-password-db"

additionalConfigProperties:
  - http-server.authentication.allow-insecure-over-http=true

# =============================================================================
# 접근 제어 (FU-9/4단계: 코드화만 — 라이브 미적용. 컷오버와 동시 활성).
# Trino 내장 file-based(B안). **테이블 열거 금지 — 정규식/그룹/계층 패턴**
# 으로 1000+ 테이블도 규칙 한 줌으로 관리. 그룹이 거버넌스 단위(group
# provider=file). 정책=git(JSON, SSOT). first-match·미매칭=거부.
# - svc-dbt: 파이프라인 엔진 → 전 계층 R/W (user 정규식)
# - svc-superset: 임퍼소네이션 허용(실유저로 위임), 직접 데이터 접근 없음
# - analysts 그룹: Gold/Silver read-only + PII 컬럼명 패턴 마스킹(샘플)
# - 그 외: 거부(기본)
# 그룹 매핑(deploy/k8s/trino/groups.txt)·신원 추가가 거버넌스 운영 표면.
# =============================================================================
accessControl:
  type: configmap
  refreshPeriod: 30s
  configFile: "rules.json"
  rules:
    rules.json: |-
      {
        "catalogs": [
          { "user": "svc-dbt", "catalog": "iceberg_(bronze|silver|gold)", "allow": "all" },
          { "group": "analysts", "catalog": "iceberg_(silver|gold)", "allow": "read-only" },
          { "user": "svc-superset", "catalog": "iceberg_(silver|gold)", "allow": "read-only" }
        ],
        "schemas": [
          { "user": "svc-dbt", "schema": ".*", "owner": true },
          { "group": "analysts", "schema": ".*", "owner": false }
        ],
        "tables": [
          { "user": "svc-dbt", "privileges": ["SELECT","INSERT","DELETE","UPDATE","OWNERSHIP"] },
          {
            "group": "analysts", "catalog": "iceberg_(silver|gold)",
            "schema": ".*", "table": ".*", "privileges": ["SELECT"],
            "columns": [
              { "name": "(?i).*(ssn|rrn|resident_no|email|phone|mobile|passwd|password).*",
                "mask": "'***-MASKED-***'" }
            ]
          }
        ],
        "impersonation": [
          { "original_user": "svc-superset", "new_user": ".*", "allow": true }
        ],
        "queries": [
          { "user": "svc-dbt", "allow": ["execute","kill","view"] },
          { "group": "analysts", "allow": ["execute","view"] }
        ]
      }
# (그룹 provider/groups.txt 는 상단 coordinator.additionalConfigFiles 에 통합)

# 레이어별 Iceberg 카탈로그(Polaris warehouse = 레이어명)
# 공통 블록: REST→Polaris OAUTH2 + native S3→SeaweedFS path-style.
catalogs:
  iceberg_bronze: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.maxdl-catalog.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=bronze
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.vended-credentials-enabled=false
    iceberg.rest-catalog.case-insensitive-name-matching=true
    iceberg.rest-catalog.case-insensitive-name-matching.cache-ttl=1m
    fs.native-s3.enabled=true
    s3.endpoint=http://host.k3d.internal:8333
    s3.region=kr-dw-pt-001
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}
  iceberg_silver: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.maxdl-catalog.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=silver
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.vended-credentials-enabled=false
    iceberg.rest-catalog.case-insensitive-name-matching=true
    iceberg.rest-catalog.case-insensitive-name-matching.cache-ttl=1m
    fs.native-s3.enabled=true
    s3.endpoint=http://host.k3d.internal:8333
    s3.region=kr-dw-pt-001
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}
  iceberg_gold: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.maxdl-catalog.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=gold
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.vended-credentials-enabled=false
    iceberg.rest-catalog.case-insensitive-name-matching=true
    iceberg.rest-catalog.case-insensitive-name-matching.cache-ttl=1m
    fs.native-s3.enabled=true
    s3.endpoint=http://host.k3d.internal:8333
    s3.region=kr-dw-pt-001
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}
