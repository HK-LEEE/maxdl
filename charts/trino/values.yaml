image:
  tag: "481"

# =============================================================================
# Trino Helm values — maxdl (차트 1.42.2 / app 480, 버전 정책: 안정 최신 핀)
# - Iceberg REST → Polaris(maxdl-catalog), native S3 → 공유 SeaweedFS.
# - 레이어별 Polaris 카탈로그(bronze/silver/gold) → Trino 카탈로그 3개 매핑.
# - SeaweedFS 는 STS/vended 미지원 → vended-credentials-enabled=false +
#   정적 S3 키(seaweedfs-s3 시크릿) + path-style(계획서 §리스크 1·2).
# - 비밀값은 env(secretKeyRef) 주입, 카탈로그 파일은 ${ENV:...} 참조.
# =============================================================================

# 단일 노드 개발: 코디네이터1 + 워커1, 리소스 절제
server:
  workers: 1

coordinator:
  resources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits:   { memory: "4Gi" }
worker:
  resources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits:   { memory: "6Gi" }

# 외부 노출: NodePort 30080 (정책: 30000번대)
service:
  type: NodePort
  port: 8080
  nodePort: 30080

# 비밀값 주입(모든 pod 공통): Polaris OAuth2 / SeaweedFS S3 정적 키
#  + Trino JWT 인증 SSO 파라미터(환경변수화, ${ENV:} 치환용)
env:
  - name: POLARIS_CREDENTIAL          # "root:<secret>" (스파이크) — polaris-oauth
    valueFrom: { secretKeyRef: { name: polaris-oauth, key: credential } }
  - name: S3_ACCESS_KEY
    valueFrom: { secretKeyRef: { name: seaweedfs-s3, key: accessKey } }
  - name: S3_SECRET_KEY
    valueFrom: { secretKeyRef: { name: seaweedfs-s3, key: secretKey } }
  - name: MAXDL_SSO_JWKS_URL          # maxplatform SSO 공개키(JWKS) — 검증용
    valueFrom: { secretKeyRef: { name: trino-sso, key: jwks-url } }
  - name: MAXDL_SSO_ISSUER
    valueFrom: { secretKeyRef: { name: trino-sso, key: issuer } }
  - name: MAXDL_SSO_AUDIENCE
    valueFrom: { secretKeyRef: { name: trino-sso, key: audience } }
  - name: MAXDL_SSO_PRINCIPAL_FIELD   # 유저명 클레임(기본 sub, 실토큰으로 실측)
    valueFrom: { secretKeyRef: { name: trino-sso, key: principal-field } }

# =============================================================================
# 인증 (1단계: 코드화만 — 라이브 미적용. 컷오버는 Superset SSO+임퍼소네이션
#  과 동시에. 지금 켜면 토큰없는 Superset/dbt 즉시 차단됨 — 의도된 보류).
# - 다중 인증자: 사람=JWT(maxplatform SSO), 기계(dbt/Airflow)=PASSWORD(svc-dbt)
#   (SSO 머신토큰 미발급 → password-file 경로). 사내망이라 allow-insecure-
#   over-http=true (정식 TLS 는 FU-7 보류 그대로).
# - JWKS/issuer/audience/principal 은 ${ENV:} 로 환경변수화(secrets.env SSOT).
# - svc-dbt password db(htpasswd 포맷 Secret 'trino-password-db')는 컷오버 시
#   secrets.env 의 SVC_DBT_PASSWORD 로 생성(앞으로의 dbt-path 단계에서 배선).
# =============================================================================
server:
  config:
    authenticationType: "jwt,password"

auth:
  # 컷오버 시 생성되는 htpasswd 포맷 Secret(svc-dbt) 참조
  passwordAuthSecret: "trino-password-db"

additionalConfigProperties:
  - http-server.authentication.allow-insecure-over-http=true
  - http-server.authentication.jwt.key-file=${ENV:MAXDL_SSO_JWKS_URL}
  - http-server.authentication.jwt.required-issuer=${ENV:MAXDL_SSO_ISSUER}
  - http-server.authentication.jwt.required-audience=${ENV:MAXDL_SSO_AUDIENCE}
  - http-server.authentication.jwt.principal-field=${ENV:MAXDL_SSO_PRINCIPAL_FIELD}

# 레이어별 Iceberg 카탈로그(Polaris warehouse = 레이어명)
# 공통 블록: REST→Polaris OAUTH2 + native S3→SeaweedFS path-style.
catalogs:
  iceberg_bronze: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.maxdl-catalog.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=bronze
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.vended-credentials-enabled=false
    iceberg.rest-catalog.case-insensitive-name-matching=true
    iceberg.rest-catalog.case-insensitive-name-matching.cache-ttl=1m
    fs.native-s3.enabled=true
    s3.endpoint=http://host.k3d.internal:8333
    s3.region=kr-dw-pt-001
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}
  iceberg_silver: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.maxdl-catalog.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=silver
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.vended-credentials-enabled=false
    iceberg.rest-catalog.case-insensitive-name-matching=true
    iceberg.rest-catalog.case-insensitive-name-matching.cache-ttl=1m
    fs.native-s3.enabled=true
    s3.endpoint=http://host.k3d.internal:8333
    s3.region=kr-dw-pt-001
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}
  iceberg_gold: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.maxdl-catalog.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=gold
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.vended-credentials-enabled=false
    iceberg.rest-catalog.case-insensitive-name-matching=true
    iceberg.rest-catalog.case-insensitive-name-matching.cache-ttl=1m
    fs.native-s3.enabled=true
    s3.endpoint=http://host.k3d.internal:8333
    s3.region=kr-dw-pt-001
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}
