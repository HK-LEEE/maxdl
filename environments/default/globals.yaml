# =============================================================================
# maxdl 전역 환경 설정 (default 환경)
# - helmfile/매니페스트가 공통 참조하는 단일 진실원천(SSOT).
# - 비밀값은 절대 여기 두지 않는다(SealedSecret 으로 분리). 여기엔 비-비밀
#   엔드포인트/포트/이름만 둔다.
# =============================================================================

# -----------------------------------------------------------------------------
# 클러스터 / 배포판
# -----------------------------------------------------------------------------
cluster:
  # 개발=k3d(단일 노드 WSL2, k3s in Docker) / 운영(폐쇄망)=실 k3s.
  # 이 필드는 어떤 릴리스도 템플릿 참조하지 않음(전수확인) — 기록용.
  distro: k3d                       # dev: k3d / prod: k3s
  name: maxdl
  # host.k3d.internal 은 **k3d 전용** 호스트 별칭(파드→Docker 호스트).
  # 실 k3s 엔 이 호스트명 자체가 없음. 비소비·기록용 잔재(연결 무관).
  hostAlias: host.k3d.internal      # k3d-dev only (prod k3s 엔 미존재)

# -----------------------------------------------------------------------------
# 외부 노출 서비스 포트 (정책: 30000~32767 만 사용)
# - k3d 클러스터 생성 시 동일 포트로 매핑됨(server:0). 변경 시 클러스터
#   재생성 또는 port-forward 필요.
# -----------------------------------------------------------------------------
nodePorts:
  trino: 30080                      # Trino coordinator (UI/JDBC 게이트)
  airbyte: 30081                    # Airbyte webapp
  airflow: 30082                    # Airflow webserver
  superset: 30088                   # Superset
  # (openmetadata 30085 제거 — OM 폐기, 계보/카탈로그=dbt docs)
  polaris: 30181                    # Polaris Iceberg REST (스파이크/디버그용)

# -----------------------------------------------------------------------------
# 외부 인프라 (클러스터 외부 — 계획서 §외부 인프라)
# -----------------------------------------------------------------------------
external:
  # S3(SeaweedFS/외부 S3) — ★권위(SSOT) 아님★. endpoint/region/bucket/
  # 키의 단일출처는 deploy/secrets/secrets.env → seaweedfs-s3 시크릿.
  # Trino/Polaris/Airbyte/catalog-bootstrap 모두 그 시크릿에서 파생하며
  # 본 블록을 템플릿 참조하지 않음(전수확인). 아래는 비권위 기록용 —
  # 개발=내부 Docker SeaweedFS, 운영=폐쇄망 외부 S3(secrets.env 만 교체).
  # (filerEndpoint 는 소비처 0 으로 제거 — 혼선 방지.)
  seaweedfs:
    s3EndpointSSOT: "secrets.env: S3_ENDPOINT (예: http://192.168.8.88:8333)"
    regionSSOT: "secrets.env: S3_REGION"
    identity: "datastore"           # 고유 키 사용(원 MAXPLATFORM_DS 키 금지)
    warehouseBucketSSOT: "secrets.env: S3_WAREHOUSE_BUCKET (예: maxdl-warehouse)"
  # 소스 DB 4종 (host 172.168.35.8) — 자격증명은 SealedSecret 으로 주입
  sourceDb:
    host: "172.168.35.8"
    maxplatform:  { type: postgres, port: 5433, database: maxplatform }
    pfms:         { type: mssql,    port: 1433, database: pfms }
    maxapex:      { type: postgres, port: 5433, database: maxapex }
    maxtdoracle:  { type: oracle,   port: 1521, database: MAXTDORACLE, serviceName: xe }

# -----------------------------------------------------------------------------
# 메달리온 / 카탈로그 명명 규약
# -----------------------------------------------------------------------------
lakehouse:
  catalogs: [bronze, silver, gold]
  bronzeNamespaces: [maxplatform, pfms, maxapex, maxtdoracle]   # 소스 DB명 = bronze 하위 네임스페이스
