# =============================================================================
# dbt-trino 연결 프로파일 — maxdl
# - dbt 는 Trino 만 바라본다(Polaris/S3 는 Trino 가 처리). 비밀값은 env 주입.
# - 인증 env 게이트: TRINO_METHOD 기본 none(현 무인증 동작 그대로 — 라이브
#   비파괴). 컷오버 시 TRINO_METHOD=ldap + TRINO_PASSWORD(svc-dbt) env 플립
#   으로 파일기반 PASSWORD 인증 전환(profiles 재배포 불필요).
# - database(catalog)/schema 는 모델 config 가 계층별로 override.
# =============================================================================
maxdl_transform:
  target: default
  outputs:
    default:
      type: trino
      method: "{{ env_var('TRINO_METHOD', 'none') }}"
      user: "{{ env_var('TRINO_USER', 'dbt') }}"
      password: "{{ env_var('TRINO_PASSWORD', '') }}"
      host: "{{ env_var('TRINO_HOST', 'trino.maxdl-query.svc.cluster.local') }}"
      port: "{{ env_var('TRINO_PORT', '8080') | int }}"
      http_scheme: "{{ env_var('TRINO_HTTP_SCHEME', 'http') }}"
      # ②: 인증서 *검증* 활성. TRINO_CERT=마운트된 self-signed CA 경로
      # (/etc/trino-ca/tls.crt) → dbt-trino 가 그 CA 로 검증(검증 OFF 아님).
      # 빈 기본값=레거시(검증 off, 비-cutover 경로 비파괴). cert SAN=
      # trino.maxdl-query.svc.cluster.local=TRINO_HOST 라 검증 통과.
      cert: "{{ env_var('TRINO_CERT', '') }}"
      catalog: "{{ env_var('TRINO_CATALOG', 'iceberg_silver') }}"
      schema: "{{ env_var('TRINO_SCHEMA', 'silver') }}"
      threads: 6           # Trino perf 튜닝(rev 16, heap 18G/16cpu) 후 상향.
                           # 1 thread = 1 동시 Trino 쿼리(per-node 9GB 안 다중 수용).
                           # 안정 확인 후 8 로 추가 상향 검토.
