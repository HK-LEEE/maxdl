# =============================================================================
# OpenMetadata 외부 노출 NodePort (정책: 30000번대)
# - OM 차트 service 에 nodePort 필드가 없어 별도 Service 로 30085 고정 노출.
# - 셀렉터는 OM 차트 파드 라벨에 맞춘다(app=openmetadata).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: openmetadata-nodeport
  namespace: maxdl-governance
  labels: { app.kubernetes.io/part-of: maxdl }
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: openmetadata
  ports:
    - name: http
      port: 8585
      targetPort: 8585
      nodePort: 30085
