# =============================================================================
# maxdl 시크릿 선언 명세 (SSOT 구조) — 평문 값은 여기 없음
# -----------------------------------------------------------------------------
# - 이 파일은 "어떤 Secret 이 / 어느 네임스페이스에 / 어떤 키로" 존재해야 하는지
#   토폴로지만 선언한다(커밋 대상). 실제 값은 deploy/secrets/secrets.env 에서
#   환경변수로 주입한다(미커밋).
# - scripts/seal-from-env.sh 가 이 명세 + secrets.env 를 읽어 대상 클러스터의
#   sealed-secrets 컨트롤러 키로 재봉인 → deploy/k8s/sealed/ 에 출력/적용.
# - file 경로는 기존 SealedSecret 파일명을 그대로 보존(역추출 결과).
# - data: <k8s Secret 키>: <secrets.env 의 환경변수명>
# =============================================================================
secrets:
  # --- 소스 DB 4종 (maxdl-ingest) ---
  - name: src-db-maxplatform
    type: Opaque
    targets:
      - { namespace: maxdl-ingest, file: deploy/k8s/sealed/src-db-maxplatform.sealed.yaml }
    data:
      host: SRC_MAXPLATFORM_HOST
      port: SRC_MAXPLATFORM_PORT
      database: SRC_MAXPLATFORM_DATABASE
      username: SRC_MAXPLATFORM_USERNAME
      password: SRC_MAXPLATFORM_PASSWORD
      type: SRC_MAXPLATFORM_TYPE

  - name: src-db-maxapex
    type: Opaque
    targets:
      - { namespace: maxdl-ingest, file: deploy/k8s/sealed/src-db-maxapex.sealed.yaml }
    data:
      host: SRC_MAXAPEX_HOST
      port: SRC_MAXAPEX_PORT
      database: SRC_MAXAPEX_DATABASE
      username: SRC_MAXAPEX_USERNAME
      password: SRC_MAXAPEX_PASSWORD
      type: SRC_MAXAPEX_TYPE

  - name: src-db-pfms
    type: Opaque
    targets:
      - { namespace: maxdl-ingest, file: deploy/k8s/sealed/src-db-pfms.sealed.yaml }
    data:
      host: SRC_PFMS_HOST
      port: SRC_PFMS_PORT
      database: SRC_PFMS_DATABASE
      username: SRC_PFMS_USERNAME
      password: SRC_PFMS_PASSWORD
      type: SRC_PFMS_TYPE

  - name: src-db-maxtdoracle
    type: Opaque
    targets:
      - { namespace: maxdl-ingest, file: deploy/k8s/sealed/src-db-maxtdoracle.sealed.yaml }
    data:
      host: SRC_MAXTDORACLE_HOST
      port: SRC_MAXTDORACLE_PORT
      database: SRC_MAXTDORACLE_DATABASE
      username: SRC_MAXTDORACLE_USERNAME
      password: SRC_MAXTDORACLE_PASSWORD
      type: SRC_MAXTDORACLE_TYPE
      serviceName: SRC_MAXTDORACLE_SERVICENAME

  # --- SeaweedFS S3 (3개 네임스페이스 동일 값) ---
  - name: seaweedfs-s3
    type: Opaque
    targets:
      - { namespace: maxdl-catalog,     file: deploy/k8s/sealed/seaweedfs-s3.maxdl-catalog.sealed.yaml }
      - { namespace: maxdl-ingest,      file: deploy/k8s/sealed/seaweedfs-s3.maxdl-ingest.sealed.yaml }
      - { namespace: maxdl-query,       file: deploy/k8s/sealed/seaweedfs-s3.maxdl-query.sealed.yaml }
      - { namespace: maxdl-orchestrate, file: deploy/k8s/sealed/seaweedfs-s3.maxdl-orchestrate.sealed.yaml }
    data:
      accessKey: S3_ACCESS_KEY
      secretKey: S3_SECRET_KEY
      endpoint: S3_ENDPOINT
      region: S3_REGION
      warehouseBucket: S3_WAREHOUSE_BUCKET

  # --- Polaris ---
  - name: polaris-bootstrap
    type: Opaque
    targets:
      - { namespace: maxdl-catalog, file: deploy/k8s/sealed/polaris-bootstrap.maxdl-catalog.sealed.yaml }
    data:
      clientId: POLARIS_BOOTSTRAP_CLIENT_ID
      clientSecret: POLARIS_BOOTSTRAP_CLIENT_SECRET
      realm: POLARIS_BOOTSTRAP_REALM

  - name: polaris-oauth
    type: Opaque
    targets:
      - { namespace: maxdl-query, file: deploy/k8s/sealed/polaris-oauth.maxdl-query.sealed.yaml }
    data:
      credential: POLARIS_OAUTH_CREDENTIAL

  # Trino 인증 = 파일 기반 PASSWORD(SSO/JWT 미사용). 'trino-password-db'
  # (htpasswd/bcrypt)는 gen-trino-password-db.sh 가 별도 생성(평문 해싱 필요).
  # 아래는 dbt/Airflow 가 svc-dbt 비번을 받는 평문 키 매핑(seal-from-env).
  - name: trino-svc-dbt
    type: Opaque
    targets:
      - { namespace: maxdl-orchestrate, file: deploy/k8s/sealed/trino-svc-dbt.maxdl-orchestrate.sealed.yaml }
    data:
      TRINO_PASSWORD: SVC_DBT_PASSWORD

  # Superset 가 Trino 에 svc-superset 로 인증 → 로그인 실유저 임퍼소네이션.
  - name: trino-svc-superset
    type: Opaque
    targets:
      - { namespace: maxdl-bi, file: deploy/k8s/sealed/trino-svc-superset.maxdl-bi.sealed.yaml }
    data:
      SUPERSET_TRINO_PASSWORD: SVC_SUPERSET_PASSWORD

  - name: polaris-persistence
    type: Opaque
    targets:
      - { namespace: maxdl-catalog, file: deploy/k8s/sealed/polaris-persistence.maxdl-catalog.sealed.yaml }
    data:
      jdbcUrl: POLARIS_PERSISTENCE_JDBC_URL
      username: POLARIS_PERSISTENCE_USERNAME
      password: POLARIS_PERSISTENCE_PASSWORD

  # --- Airbyte / Airflow / Superset / OpenMetadata ---
  - name: airbyte-api
    type: Opaque
    targets:
      - { namespace: maxdl-orchestrate, file: deploy/k8s/sealed/airbyte-api.maxdl-orchestrate.sealed.yaml }
    data:
      AIRBYTE_CLIENT_ID: AIRBYTE_CLIENT_ID
      AIRBYTE_CLIENT_SECRET: AIRBYTE_CLIENT_SECRET

  - name: airflow-webserver-secret
    type: Opaque
    targets:
      - { namespace: maxdl-orchestrate, file: deploy/k8s/sealed/airflow-webserver-secret.maxdl-orchestrate.sealed.yaml }
    data:
      webserver-secret-key: AIRFLOW_WEBSERVER_SECRET_KEY

  - name: airflow-secrets
    type: Opaque
    targets:
      - { namespace: maxdl-governance, file: deploy/k8s/sealed/airflow-secrets.maxdl-governance.sealed.yaml }
    data:
      openmetadata-airflow-password: OM_AIRFLOW_PASSWORD

  - name: mysql-secrets
    type: Opaque
    targets:
      - { namespace: maxdl-governance, file: deploy/k8s/sealed/mysql-secrets.maxdl-governance.sealed.yaml }
    data:
      openmetadata-mysql-password: OM_MYSQL_PASSWORD

  - name: superset-admin
    type: Opaque
    targets:
      - { namespace: maxdl-bi, file: deploy/k8s/sealed/superset-admin.maxdl-bi.sealed.yaml }
    data:
      admin-password: SUPERSET_ADMIN_PASSWORD

  - name: superset-secret
    type: Opaque
    targets:
      - { namespace: maxdl-bi, file: deploy/k8s/sealed/superset-secret.maxdl-bi.sealed.yaml }
    data:
      SUPERSET_SECRET_KEY: SUPERSET_SECRET_KEY
